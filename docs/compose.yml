services:
  app:
    build: ..
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - dbot-data:/data
    environment:
      - DBOT_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s   # allow 60s index build + buffer

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  dbot-data:
    driver: local
